<!DOCTYPE html>
<html>
<head>
  <title>WestCoastDvision</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Helvetica, sans-serif;
      background: black;
      color: white;
    }

    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
    }

    h1 {
      font-size: 60px;
      letter-spacing: 4px;
      margin: 0;
    }

    p {
      opacity: 0.6;
      margin-top: 10px;
    }

    .btn {
      margin-top: 30px;
      padding: 12px 25px;
      border: 1px solid white;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>WESTCOASTDVISION</h1>
    <p>Creative Direction • Music • Vision</p>

    <a class="btn" href="#">ENTER</a>
  </div>

</body>
</html>
